bot_id: swing_trader
repo_url: git@github.com:user/swing_trader.git
repo_dir: /repos/swing_trader
default_branch: main
allowed_edit_paths:
  - config/*
  - strategies/*
  - tests/*
  - docs/*
structural_context_paths:
  - config/*
  - strategies/*
  - tests/*
verification_commands:
  - pytest tests -q
strategies:
  - ATRSS
  - AKC_HELIX
  - BRS_R9
  - S5_PB
  - S5_DUAL
parameters:
  # === ATRSS — ATR Swing Strategy ===
  - param_name: daily_mult
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.daily_mult
    current_value: 2.2
    valid_range: [1.0, 4.0]
    value_type: float
    category: exit_timing
    is_safety_critical: false
  - param_name: hourly_mult
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.hourly_mult
    current_value: 3.0
    valid_range: [1.5, 5.0]
    value_type: float
    category: exit_timing
    is_safety_critical: false
  - param_name: chand_mult
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.chand_mult
    current_value: 3.0
    valid_range: [1.5, 5.0]
    value_type: float
    category: exit_timing
    is_safety_critical: false
  - param_name: adx_on
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.adx_on
    current_value: 14
    valid_range: [8, 30]
    value_type: int
    category: filter_threshold
    is_safety_critical: false
  - param_name: adx_off
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.adx_off
    current_value: 18
    valid_range: [10, 30]
    value_type: int
    category: filter_threshold
    is_safety_critical: false
  - param_name: base_risk_pct
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.base_risk_pct
    current_value: 0.024
    valid_range: [0.005, 0.05]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: shorts_enabled
    strategy_id: ATRSS
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/atrss/config.py
    python_path: SymbolConfig.shorts_enabled
    current_value: true
    valid_values: [true, false]
    value_type: bool
    category: ablation
    is_safety_critical: false

  # === AKC_HELIX — Swing Divergence ===
  - param_name: corridor_cap_chop
    strategy_id: AKC_HELIX
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/akc_helix/config.py
    python_path: SymbolConfig.corridor_cap_chop
    current_value: 1.3
    valid_range: [0.8, 2.5]
    value_type: float
    category: filter_threshold
    is_safety_critical: false
  - param_name: corridor_cap_trend
    strategy_id: AKC_HELIX
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/akc_helix/config.py
    python_path: SymbolConfig.corridor_cap_trend
    current_value: 1.6
    valid_range: [1.0, 3.0]
    value_type: float
    category: filter_threshold
    is_safety_critical: false
  - param_name: chandelier_lookback
    strategy_id: AKC_HELIX
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/akc_helix/config.py
    python_path: SymbolConfig.chandelier_lookback
    current_value: 30
    valid_range: [10, 60]
    value_type: int
    category: exit_timing
    is_safety_critical: false
  - param_name: base_risk_pct
    strategy_id: AKC_HELIX
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/akc_helix/config.py
    python_path: SymbolConfig.base_risk_pct
    current_value: 0.009
    valid_range: [0.003, 0.03]
    value_type: float
    category: risk_management
    is_safety_critical: true

  # === BRS_R9 — Bear Regime Swing ===
  - param_name: BASE_RISK_PCT
    strategy_id: BRS_R9
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/brs_r9/config.py
    python_path: BASE_RISK_PCT
    current_value: 0.0072
    valid_range: [0.003, 0.02]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: DAILY_STOP_R
    strategy_id: BRS_R9
