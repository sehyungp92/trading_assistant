  - param_name: HEAT_CAP_R
    strategy_id: BRS_R9
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/brs_r9/config.py
    python_path: HEAT_CAP_R
    current_value: 2.25
    valid_range: [1.0, 4.0]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: adx_on
    strategy_id: BRS_R9
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/brs_r9/config.py
    python_path: BRSSymbolConfig.adx_on
