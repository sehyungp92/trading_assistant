  - param_name: daily_mult
    strategy_id: BRS_R9
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/brs_r9/config.py
    python_path: BRSSymbolConfig.daily_mult
    current_value: 2.3
    valid_range: [1.0, 4.0]
    value_type: float
    category: exit_timing
    is_safety_critical: false
  - param_name: chand_mult
    strategy_id: BRS_R9
    param_type: PYTHON_CONSTANT
    file_path: strategies/swing/brs_r9/config.py
    python_path: BRSSymbolConfig.chand_mult
    current_value: 3.2
