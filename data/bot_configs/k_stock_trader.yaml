bot_id: k_stock_trader
repo_url: git@github.com:user/k_stock_trader.git
repo_dir: /repos/k_stock_trader
default_branch: main
allowed_edit_paths:
  - strategy_kmp/config/*
  - config/*
  - tests/*
  - docs/*
  - README.md
structural_context_paths:
  - strategy_kmp/*
  - config/*
  - tests/*
verification_commands:
  - pytest tests -q
strategies:
  - kmp
parameters:
  - param_name: quality_min_threshold
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.quality_min_threshold
    current_value: 0.6
    valid_range: [0.0, 1.0]
    value_type: float
    category: entry_signal
    is_safety_critical: false
  - param_name: or_range_max
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.or_range_max
    current_value: 0.15
    valid_range: [0.05, 0.5]
    value_type: float
    category: entry_signal
    is_safety_critical: false
  - param_name: rsi_min
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.rsi_min
    current_value: 30
    valid_range: [10, 50]
    value_type: int
    category: entry_signal
    is_safety_critical: false
  - param_name: rsi_max
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.rsi_max
    current_value: 70
    valid_range: [50, 90]
    value_type: int
    category: entry_signal
    is_safety_critical: false
  - param_name: volume_ratio_min
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.volume_ratio_min
    current_value: 1.5
    valid_range: [0.5, 5.0]
    value_type: float
    category: filter_threshold
    is_safety_critical: false
  - param_name: atr_filter_mult
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.atr_filter_mult
    current_value: 1.0
    valid_range: [0.5, 3.0]
    value_type: float
    category: filter_threshold
    is_safety_critical: false
  - param_name: max_spread_pct
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.max_spread_pct
    current_value: 0.1
    valid_range: [0.01, 0.5]
    value_type: float
    category: filter_threshold
    is_safety_critical: false
  - param_name: max_positions
    strategy_id: kmp
    param_type: YAML_FIELD
    file_path: strategy_kmp/config/switches.yaml
    yaml_key: kmp.max_positions
    current_value: 5
    valid_range: [1, 20]
    value_type: int
    category: risk_management
    is_safety_critical: true
  - param_name: base_risk_pct
    param_type: PYTHON_CONSTANT
    file_path: config/risk.py
    python_path: BASE_RISK_PCT
    current_value: 0.02
    valid_range: [0.005, 0.05]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: daily_stop_r
    param_type: PYTHON_CONSTANT
    file_path: config/risk.py
    python_path: DAILY_STOP_R
    current_value: 3.0
    valid_range: [1.0, 10.0]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: heat_cap_r
    param_type: PYTHON_CONSTANT
    file_path: config/risk.py
    python_path: HEAT_CAP_R
    current_value: 6.0
    valid_range: [2.0, 15.0]
    value_type: float
    category: risk_management
    is_safety_critical: true
