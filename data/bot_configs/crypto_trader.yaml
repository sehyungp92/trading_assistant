bot_id: crypto_trader
repo_url: git@github.com:user/crypto_trader.git
repo_dir: /repos/crypto_trader
default_branch: main
allowed_edit_paths:
  - config/*
  - strategy/*
  - tests/*
  - docs/*
structural_context_paths:
  - config/*
  - strategy/*
  - backtest/*
verification_commands:
  - pytest tests -q
strategies:
  - MomentumPullback_M15
  - InstitutionalAnchor_H1
  - VolumeProfileBreakout_M30
