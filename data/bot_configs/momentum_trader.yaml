bot_id: momentum_trader
repo_url: git@github.com:user/momentum_trader.git
repo_dir: /repos/momentum_trader
default_branch: main
allowed_edit_paths:
  - config/*
  - strategies/*
  - tests/*
  - docs/*
structural_context_paths:
  - config/*
  - strategies/*
  - tests/*
verification_commands:
  - pytest tests -q
strategies:
  - DownturnDominator_v1
  - AKC_Helix_v40
  - NQDTC_v2.1
  - VdubusNQ_v4
parameters:
  # === DownturnDominator_v1 — Risk ===
  - param_name: BASE_RISK_PCT
    strategy_id: DownturnDominator_v1
    param_type: PYTHON_CONSTANT
    file_path: strategies/momentum/downturn/config.py
    python_path: BASE_RISK_PCT
    current_value: 0.020
    valid_range: [0.005, 0.05]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: DAILY_STOP_R
    strategy_id: DownturnDominator_v1
    param_type: PYTHON_CONSTANT
    file_path: strategies/momentum/downturn/config.py
    python_path: DAILY_STOP_R
    current_value: 3.0
    valid_range: [1.0, 6.0]
    value_type: float
    category: risk_management
    is_safety_critical: true
  - param_name: HEAT_CAP_R
    strategy_id: DownturnDominator_v1
