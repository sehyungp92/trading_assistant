    archetype: pullback
    asset_class: mixed
    symbols: [QQQ, GLD]
    preferred_regimes: [trending_up, trending_down]
    adverse_regimes: [ranging, volatile]
    holding_period: multi_day
    risk:
      unit_risk_dollars: 200.0
      daily_stop_R: 2.0
      max_heat_R: 1.50
      tp_ratio: 1.5
    allocation:
      base_risk_pct: 0.018
    macro_regime_sensitivity: {G: full, R: full, S: reduced, D: reduced}
    entry_types: [TYPE_A, TYPE_B, TYPE_C, PB30, EMA20_VALUE_TOUCH, SECOND_ENTRY]
    key_metadata_fields: [score_grade, type_label, fib_zone, pullback_bars, vwap_confirmation, structure_confirmation]
    exit_profile:
      tiers:
        - tier_name: T1
          tier_type: take_profit
          r_target: 1.5
          partial_pct: 0.45
        - tier_name: T2
          tier_type: take_profit
          r_target: 2.0
          partial_pct: 0.275
      has_chandelier: false
      regime_multipliers:
        trending_up: 1.0
        trending_down: 1.0
        volatile: 0.85
    analysis_focus:
      - type_a_vs_b_vs_c_performance
      - pb30_vs_1h_pullback_efficacy
      - score_grade_calibration
      - second_entry_attribution
      - mfe_giveback_protection_value

