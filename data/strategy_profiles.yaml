coordination:
  signals:
    - trigger: {strategy: ATRSS, event: ENTRY_FILL}
      target: {strategy: AKC_HELIX, action: TIGHTEN_STOP_BE}
      condition: SAME_SYMBOL
    - trigger: {strategy: ATRSS, event: POSITION_OPEN}
      target: {strategy: AKC_HELIX, action: SIZE_BOOST}
      condition: SAME_SYMBOL_SAME_DIRECTION
      params: {size_mult: 1.25}
    - trigger: {strategy: BRS_R9, event: POSITION_OPEN}
      target: {strategy: ATRSS, action: REDUCE_SIZE}
      condition: SAME_SYMBOL_OPPOSITE_DIRECTION
      params: {size_mult: 0.5}
  cooldown_pairs:
    - strategies: [AKC_Helix_v40, "NQDTC_v2.1"]
      minutes: 120
      session_only: true
      session_window: ["09:45", "11:30"]
    - strategies: [DOWNTURN, AKC_Helix_v40]
      minutes: 60
      session_only: true
      session_window: ["09:45", "16:00"]
  direction_filter:
    observer: VdubusNQ_v4
    reference: "NQDTC_v2.1"
    agree_mult: 1.50
    oppose_mult: 0.0
  stock_coordination:
    directional_cap_R: 8.0
    symbol_collision_action: half_size
    strategies: [IARIC_v1, US_ORB_v1, ALCB_v1]

