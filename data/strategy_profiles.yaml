strategies:
  ATRSS:
    display_name: "ATR Swing Strategy"
    bot_id: swing_multi_01
    family: swing
    archetype: trend_follow
    asset_class: mixed
    symbols: [QQQ, GLD]
    preferred_regimes: [trending_up, trending_down]
    adverse_regimes: [ranging]
    holding_period: multi_day
    risk:
      unit_risk_dollars: 200.0
      daily_stop_R: 2.0
      max_heat_R: 1.50
      tp_ratio: 2.0
    allocation:
      base_risk_pct: 0.018
    macro_regime_sensitivity: {G: full, R: full, S: reduced, D: reduced}

