coordination:
  signals:
    - trigger: {strategy: ATRSS, event: ENTRY_FILL}
      target: {strategy: AKC_HELIX, action: TIGHTEN_STOP_BE}
      condition: SAME_SYMBOL
    - trigger: {strategy: ATRSS, event: POSITION_OPEN}
      target: {strategy: AKC_HELIX, action: SIZE_BOOST}
      condition: SAME_SYMBOL_SAME_DIRECTION
      params: {size_mult: 1.25}
  cooldown_pairs: []
  direction_filter:
    observer: VdubusNQ_v4
    reference: "NQDTC_v2.1"
    agree_mult: 1.50
    oppose_mult: 0.0
  stock_coordination:
    directional_cap_R: 8.0
    symbol_collision_action: half_size
    strategies: [IARIC_v1, ALCB_v1]

